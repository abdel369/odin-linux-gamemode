name: shellcheck

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Syntax check
        run: |
          bash -n install.sh
          find lib modules scripts -type f -print0 | xargs -0 -r bash -n

      - name: Shellcheck
        run: |
          shellcheck -x -P . install.sh
          find lib modules scripts -type f -print0 | xargs -0 -r shellcheck -x -P .
