name: shellcheck
on:
  pull_request:
  push:
    branches: [main]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Syntax check
        run: bash -n install.sh lib/*.sh modules/*.sh scripts/*
      - name: Shellcheck
        run: shellcheck install.sh lib/*.sh modules/*.sh scripts/*
